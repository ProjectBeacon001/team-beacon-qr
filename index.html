<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Beacon</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#0f5132;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.card{

background:white;
color:#0f5132;
padding:40px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.25);
max-width:500px;
width:90%;

}

h1{
font-size:40px;
margin:0;
}

h2{
font-size:28px;
margin-top:10px;
}

#visitor{
font-size:60px;
font-weight:bold;
color:#c62828;
margin:20px 0;
}

p{
font-size:18px;
}

</style>

</head>

<body>

<div class="card">

<h2>🙏 हर हर महादेव 🙏</h2>

<h1>THANK YOU</h1>

<p>You are the</p>

<div id="visitor">...</div>

<p>YATRI</p>

<p>Thank you for connecting with <b>TEAM BEACON</b></p>

<p>Redirecting...</p>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbw8QUk7K-OkoPHNRVILu220UoZiNvZ3tv0947f3Oj1lURbqLY9-AAhWfOv6klYl6Bc/exec";

fetch(api)
.then(r=>r.json())
.then(data=>{

let n=data.scanNo;

function ordinal(x){

if(x%100>=11 && x%100<=13) return x+"th";

switch(x%10){

case 1:return x+"st";
case 2:return x+"nd";
case 3:return x+"rd";
default:return x+"th";

}

}

document.getElementById("visitor").innerHTML=ordinal(n);

setTimeout(function(){

window.location.href="https://sites.google.com/view/thank-you-yatri-2026/home";

},3000);

});

</script>

</body>
</html>
